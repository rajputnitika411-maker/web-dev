<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css selectors</title>
    <style>
        /*element selector*/
        div {
            /*background-color: sandybrown;*/
        }

        /*class selector*/
        .red {
            background-color: red;
        }

        /* id selector */
        #green {
            background-color: rgb(137, 232, 35);
        }

        /*child selector*/
        div>p {color: whitesmoke;
            background-color: cyan;
        }

        /*descendant selector*/
        div p {
            background-color: whitesmoke;
        }

        /*universal selector*/
        * {
            margin: 0;
            padding: 0;
        }

        /*pseudo selector*/
        a:visited {
            color: rgb(255, 0, 204);
        }

        a:link {
            color: rgb(255, 0, 136);
        }

        a:active {
            color: rgb(0, 255, 255);
        }

        a:hover {
            background-color: rgb(16, 96, 157);
        }

        p:first-child {
            background-color: rgb(0, 225, 255);
        }
    </style>
</head>
<body>
    <main class="one">
        <p>hey i m a first</p>
        <p>hey i m a second</p>
    </main>
    <div class="red">
        hey i m div
        <article>
        <p>hey i m a paragraph in an article</p>
        </article>
    </div>
    <div id="green">
        hey i m another div
    </div>
    <a href="https://www.google.com">Google</a>
    <a href="https://www.facebook.com">Facebook</a>
</body>
</html>
